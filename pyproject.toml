[tool.ruff]
# Box-Box lint config. The codebase deliberately uses long explanatory comments
# and wide table/format literals, so line-length is not enforced (E501 ignored);
# everything else in the default-plus set is a real-signal rule.
line-length = 100
target-version = "py311"
extend-exclude = ["venv", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",   # long lines — intentional for comments and wide literals
    "B905",   # zip() without strict= — columns are equal-length by construction
]

[tool.pytest.ini_options]
testpaths = ["tests"]
