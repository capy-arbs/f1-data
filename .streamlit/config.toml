[theme]
# Pitwall — broadcast-style dark theme. F1 red accent over deep black,
# moderate-contrast surfaces, near-white type. Tuned to keep chart
# fills (purple sectors, yellow flags, team colors) readable.
primaryColor = "#E10600"
backgroundColor = "#0A0B0F"
secondaryBackgroundColor = "#15161D"
textColor = "#F5F5F7"
font = "sans serif"

[server]
headless = true

[client]
showSidebarNavigation = true
toolbarMode = "minimal"
